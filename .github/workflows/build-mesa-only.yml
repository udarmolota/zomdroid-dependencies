name: Build Mesa Only (RimDroid libzfa)

on:
  workflow_dispatch:

jobs:
  build:
    name: Android ARM64 Release - mesa only
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up environment (Mesa build deps)
      run: |
          echo "deb-src http://archive.ubuntu.com/ubuntu/ $(lsb_release -cs) main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/ubuntu-source.list
          sudo apt update
          sudo apt build-dep -y mesa

    - name: Download and install Android NDK
      run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
          unzip -q android-ndk-r27c-linux.zip
          echo "ANDROID_NDK_HOME=$(pwd)/android-ndk-r27c" >> $GITHUB_ENV

    - name: Set env vars
      run: |
          echo "ANDROID_API_LEVEL=30" >> $GITHUB_ENV
          echo "ANDROID_ABI=arm64-v8a" >> $GITHUB_ENV
          echo "BUILD_TYPE_CMAKE=Release" >> $GITHUB_ENV
          echo "TARGET_TRIPLE=aarch64-linux-android" >> $GITHUB_ENV

    - name: Build mesa (libzfa with zfaReleaseCurrent)
      run: |
          chmod +x ./build-mesa.sh
          ./build-mesa.sh

    - name: Upload targets (libzfa.so / libvulkan_freedreno.so / libOSMesa.so)
      uses: actions/upload-artifact@v4
      with:
        name: targets-mesa
        path: targets
