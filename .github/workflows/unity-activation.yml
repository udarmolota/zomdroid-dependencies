# One-time helper to obtain a Unity activation request file (.alf).
# Run this once (Actions tab -> "Get Unity Activation File" -> Run workflow), download the
# "Manual_Activation_File" artifact, then follow the steps in the project README to turn the
# .alf into a .ulf and store it as the UNITY_LICENSE repo secret. After that you never need
# this workflow again.

name: Get Unity Activation File

on:
  workflow_dispatch: {}

jobs:
  activation:
    runs-on: ubuntu-latest
    steps:
      - name: Request manual activation file
        id: getManualLicenseFile
        uses: game-ci/unity-request-activation-file@v2
      - name: Upload activation file
        uses: actions/upload-artifact@v4
        with:
          name: Manual_Activation_File
          path: ${{ steps.getManualLicenseFile.outputs.filePath }}
